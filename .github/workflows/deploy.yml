name: Deploy to Production
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 144.91.66.205
          username: sgi-deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: /opt/sgi/deploy.sh