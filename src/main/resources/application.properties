# ============================================================
# SGI - Configuración base (valores comunes a todos los perfiles)
# NO contiene credenciales - estas van en application-{perfil}
# ============================================================
spring.application.name=sgi-backend

# Perfil activo: dev por defecto, prod en servidor
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP base
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA
spring.jpa.properties.hibernate.format_sql=true
# default_schema eliminado: entidades shared usan schema="shared" en @Table explícitamente.
# Las tablas tenant (miembros, etc.) deben resolverse via search_path del MultiTenantConnectionProvider.
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.schema_management_tool=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=public
spring.flyway.schemas=public,shared
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.placeholder-replacement=false

# Servidor
server.port=${SERVER_PORT:8080}

# Multipart — importación CSV/Excel (H2.4)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# Logs base
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN

# JWT - valores por defecto
sgi.jwt.secret=${SGI_JWT_SECRET:dev-secret-cambiar-en-produccion-minimo-32-chars}
sgi.jwt.expiration-minutes=60
sgi.jwt.refresh-expiration-days=30
