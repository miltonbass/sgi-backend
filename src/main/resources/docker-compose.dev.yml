version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sgi_postgres_dev
    environment:
      POSTGRES_DB: sgi_system
      POSTGRES_USER: sgi_admin
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgi_admin -d sgi_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sgi_redis_dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./sgi-backend
      dockerfile: Dockerfile
    container_name: sgi_backend_dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      # Hot reload: monta el código fuente
      - ./sgi-backend:/app
    profiles:
      - full   # Solo corre con: docker compose --profile full up

volumes:
  postgres_dev_data: